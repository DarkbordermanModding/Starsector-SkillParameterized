plugins {
    id 'java'
}

repositories {
    mavenCentral()
}

java {
    sourceCompatibility = JavaVersion.VERSION_1_7
    targetCompatibility = JavaVersion.VERSION_1_7
}

sourceSets.main.java.srcDir 'src'

base {
    archivesName = 'skillparameterized'
}

dependencies {
    implementation fileTree(dir: './lib/', include: '*.jar')
}

jar {
    doLast {
        copy {
            from archiveFile
            into 'jars'
        }
    }
}

tasks.register('release', Zip) {
    description 'Create releaseable zip file.'
    def cmdOutput = 'jq -rj .version mod_info.json'.execute().text
    from '.'
    include 'src/'
    include 'data/'
    include 'graphics/'
    include 'sounds/'
    include 'jars/'
    include 'mod_info.json'
    archiveFileName = project.base.archivesName.get() + '-' + cmdOutput + '.zip'
    destinationDirectory = file('bin/')
}

tasks.named('clean') {
    delete fileTree('jars/') { include '*.jar' }
    delete fileTree('bin/') { include '*.zip' }
}
